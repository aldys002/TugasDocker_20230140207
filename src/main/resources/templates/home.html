<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Home - My Website</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
    <h2>MY Website 20230140216</h2> <p>Selamat datang di aplikasi!</p>
    <hr>
    <a href="/form" class="btn btn-success mb-3">Input Data Mahasiswa</a>
    <a href="/logout" class="btn btn-danger mb-3 float-end">Logout</a>

    <h4>Data Mahasiswa</h4>
    <table class="table table-bordered table-striped">
        <thead>
        <tr>
            <th>No</th>
            <th>Nama</th>
            <th>NIM</th>
            <th>Jenis Kelamin</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="mhs, iter : ${dataMhs}">
            <td th:text="${iter.count}"></td>
            <td th:text="${mhs.nama}"></td>
            <td th:text="${mhs.nim}"></td>
            <td th:text="${mhs.jenisKelamin}"></td>
        </tr>
        <tr th:if="${dataMhs.empty}">
            <td colspan="4" class="text-center">Belum ada data</td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
